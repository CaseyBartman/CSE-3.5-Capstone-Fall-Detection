; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
build_flags =
    -I include
    -I src

; Simulation (Wokwi)
[env:sim]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
build_flags =
    ${common.build_flags}
    -DIS_SIMULATION
build_src_filter =
    +<*>
    -<drivers/sim/>
    -<drivers/real/>
    -<drivers/archive/>

; Real Hardware (Uno R4 WiFi + Tekscan A502 + PhysicalButton + Ntfy)
[env:real]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
build_flags =
    ${common.build_flags}
    -DIS_REAL
build_src_filter =
    +<*>
    -<drivers/sim/>
    -<drivers/archive/>

; Archive (TekscanA502 + BlueCharm BLE + LED)
[env:archive]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
build_flags =
    ${common.build_flags}
    -DIS_ARCHIVE
build_src_filter =
    +<*>
    -<drivers/sim/>
    -<drivers/real/>
    -<drivers/archive/>

; Simulation with "software" button press
[env:sim_button]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
build_flags =
    ${common.build_flags}
    -DIS_REAL
    -DSIM_BUTTON
build_src_filter =
    +<*>
    -<drivers/sim/>
    -<drivers/archive/>
    +<drivers/sw_sim/>

; ESP32 Button Controller
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = ${common.build_flags} -DESP32_BUTTON
build_src_filter = +<*> -<drivers/sim/> -<drivers/real/> -<drivers/archive/> -<main.cpp>
