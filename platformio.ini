[platformio]
default_envs = wokwi-sim

; SHARED SETTINGS
[env]
framework = arduino
monitor_speed = 115200
build_flags = 
    -I include

; WOKWI SIMULATION BUILD
[env:wokwi-sim]
platform = espressif32
board = esp32dev
build_flags = 
    ${env.build_flags}
    -D IS_SIMULATION
    -D LOG_LEVEL=3
lib_deps = 
    ; No external libraries needed for basic simulation

; REAL HARDWARE BUILD
[env:production-esp32]
platform = espressif32
board = esp32dev
build_flags = 
    ${env.build_flags}
    -D IS_REAL_HARDWARE
lib_deps = 
    ; Add real hardware libraries when needed:
    ; - BLE libraries (NimBLE-Arduino or ESP32 BLE Arduino)
    ; - HTTPClient (built-in with ESP32)
    ; - WiFi (built-in with ESP32)
    ; - ArduinoJson (for Connexxall API)
